<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --color-bg: {{COLOR_BG}};
    --color-headline: {{COLOR_HEADLINE}};
    --color-body: {{COLOR_BODY}};
    --color-accent: {{COLOR_ACCENT}};
    --color-dot-active: {{COLOR_DOT_ACTIVE}};
    --color-dot-inactive: {{COLOR_DOT_INACTIVE}};
    --font-family: {{FONT_FAMILY}};
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    background: var(--color-bg);
    font-family: var(--font-family), sans-serif;
    overflow: hidden;
  }
  .slide {
    position: relative;
    width: 100%;
    height: 100%;
    padding: {{SAFE_TOP}}px {{SAFE_RIGHT}}px {{SAFE_BOTTOM}}px {{SAFE_LEFT}}px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .accent {
    width: 56px;
    height: 6px;
    background: var(--color-accent);
    margin-bottom: 24px;
  }
  .headline {
    color: var(--color-headline);
    font-weight: {{HEADLINE_WEIGHT}};
    font-size: {{HEADLINE_SIZE}}px;
    line-height: 1.15;
    margin-bottom: 20px;
  }
  .body {
    color: var(--color-body);
    font-weight: {{BODY_WEIGHT}};
    font-size: {{BODY_SIZE}}px;
    line-height: {{BODY_LINE_HEIGHT}};
  }
  .progress-dots {
    position: absolute;
    bottom: {{DOTS_BOTTOM}}px;
    left: {{SAFE_LEFT}}px;
    display: flex;
    gap: {{DOTS_GAP}}px;
  }
  .progress-dots span {
    width: {{DOT_SIZE}}px;
    height: {{DOT_SIZE}}px;
    border-radius: 50%;
    background: var(--color-dot-inactive);
  }
  .progress-dots span.active {
    background: var(--color-dot-active);
  }
  .swipe-arrow {
    position: absolute;
    bottom: {{DOTS_BOTTOM}}px;
    right: {{ARROW_RIGHT}}px;
    color: var(--color-headline);
    font-size: {{ARROW_SIZE}}px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="accent"></div>
    <div class="headline">{{HEADLINE}}</div>
    <div class="body">{{BODY}}</div>
    <div class="progress-dots">{{DOTS_HTML}}</div>
    {{SWIPE_ARROW_HTML}}
  </div>
</body>
</html>
